<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADHDFocus Lab - Sudoku</title>
    <style>
        :root { 
            --cell-size: calc(100vw / 10); 
            --border-thick: 3px; 
            --accent: #4dadff;
            --bg: #121212;
            --cell-bg: #1e1e1e;
            --success: #2e7d32;
        }
        body { 
            background: var(--bg); 
            color: #e0e0e0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 10px; 
            touch-action: manipulation; 
        }
        #status-bar { display: flex; justify-content: space-around; width: 100%; max-width: 400px; margin-bottom: 10px; font-family: monospace; font-size: 18px; }
        .stat-value { color: var(--accent); font-weight: bold; }
        #grid { display: none; grid-template-columns: repeat(9, var(--cell-size)); grid-template-rows: repeat(9, var(--cell-size)); border: var(--border-thick) solid #fff; background: #fff; }
        .cell { width: var(--cell-size); height: var(--cell-size); background: var(--cell-bg); border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-size: calc(var(--cell-size) * 0.5); cursor: pointer; box-sizing: border-box; position: relative; }
        .cell:nth-child(3n) { border-right: var(--border-thick) solid #fff; }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27), .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: var(--border-thick) solid #fff; }
        .cell.fixed { color: #fff; font-weight: bold; background: #2a2a2a; }
        .cell.user { color: var(--accent); }
        .cell.error { background: #4d1e1e; animation: shake 0.2s; }
        .cell.selected { background: #333; outline: 2px solid var(--accent); z-index: 5; }
        .pencil-marks { display: grid; grid-template-columns: repeat(3, 1fr); width: 100%; height: 100%; font-size: 10px; line-height: 10px; color: #aaa; pointer-events: none; position: absolute; }
        .pencil-mark { display: flex; align-items: center; justify-content: center; }
        #controls { display: none; width: 100%; max-width: 400px; margin-top: 15px; }
        #numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 10px; }
        .num-btn { background: #333; color: #fff; border: 1px solid #555; padding: 15px 0; font-size: 20px; border-radius: 5px; text-align: center; }
        .num-btn:active { background: var(--accent); }
        .mode-btn { width: 100%; padding: 12px; background: #444; border: none; color: #fff; border-radius: 5px; font-weight: bold; margin-top: 5px; font-size: 14px; }
        .mode-btn.active { background: #ff9800; }
        .btn-auto { background: var(--success); }
        #setup { width: 90%; max-width: 500px; text-align: center; margin-top: 20px; }
        textarea { width: 100%; height: 120px; background: #222; color: #0f0; border: 1px solid #444; padding: 10px; box-sizing: border-box; font-family: monospace; }
        .start-btn { width: 100%; padding: 15px; margin-top: 10px; background: var(--accent); color: #fff; border: none; font-size: 18px; font-weight: bold; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
    </style>
</head>
<body>

    <h2 style="margin: 10px 0;">ADHDFocus Lab</h2>
    
    <div id="status-bar">
        <div>TIME <span id="timer" class="stat-value">00:00.0</span></div>
        <div>ERRORS <span id="error-count" class="stat-value">0</span></div>
    </div>
    
    <div id="setup">
        <textarea id="jsonInput" placeholder="Paste JSON or 81-digit string"></textarea>
        <button class="start-btn" onclick="handleStart()">START CHALLENGE</button>
    </div>

    <div id="grid"></div>

    <div id="controls">
        <button class="mode-btn btn-auto" onclick="autoFillPencil()">FAST PENCIL</button>
        <div id="numpad" style="margin-top: 10px;">
            <div class="num-btn" onclick="handleInput('1')">1</div>
            <div class="num-btn" onclick="handleInput('2')">2</div>
            <div class="num-btn" onclick="handleInput('3')">3</div>
            <div class="num-btn" onclick="handleInput('4')">4</div>
            <div class="num-btn" onclick="handleInput('5')">5</div>
            <div class="num-btn" onclick="handleInput('6')">6</div>
            <div class="num-btn" onclick="handleInput('7')">7</div>
            <div class="num-btn" onclick="handleInput('8')">8</div>
            <div class="num-btn" onclick="handleInput('9')">9</div>
            <div class="num-btn" onclick="handleInput('')">⌫</div>
        </div>
        <button id="pencil-toggle" class="mode-btn" onclick="togglePencil()">PENCIL MODE: OFF</button>
    </div>

    <script>
        let selectedIndex = -1, errors = 0, startTime, timerInterval, solution = [], pencilMode = false, autoPencilActive = false;
        let manualRemoved = Array.from({ length: 81 }, () => []), isFixed = new Array(81).fill(false);

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const puzzle = urlParams.get('puzzle');
            if (puzzle) {
                document.getElementById('jsonInput').value = puzzle;
                handleStart();
            }
        };

        function handleStart() {
            try {
                let input = document.getElementById('jsonInput').value.trim();
                let board = [];
                if (/^\d{81}$/.test(input)) {
                    board = input.split('').map(Number);
                } else {
                    board = JSON.parse(input).flat();
                }
                let boardCopy = [...board];
                if (!solveSudoku(boardCopy)) throw "無解";
                solution = boardCopy;
                initGrid(board);
            } catch (e) { alert("Format Error or Unsolvable"); }
        }

        function solveSudoku(b) {
            const i = b.indexOf(0);
            if (i === -1) return true;
            for (let n = 1; n <= 9; n++) {
                if (isValid(b, i, n)) {
                    b[i] = n;
                    if (solveSudoku(b)) return true;
                    b[i] = 0;
                }
            }
            return false;
        }

        function isValid(b, idx, v) {
            const r = Math.floor(idx/9), c = idx%9;
            for (let i=0; i<9; i++) if (b[r*9+i]===v || b[i*9+c]===v) return false;
            const br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3;
            for (let i=0; i<3; i++) for (let j=0; j<3; j++) if (b[(br+i)*9+(bc+j)]===v) return false;
            return true;
        }

        function initGrid(initial) {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            initial.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = val === 0 ? 'cell' : 'cell fixed';
                const marks = document.createElement('div');
                marks.className = 'pencil-marks';
                for(let m=1; m<=9; m++) {
                    const mk = document.createElement('div');
                    mk.className = `pencil-mark m${m}`;
                    marks.appendChild(mk);
                }
                cell.appendChild(marks);
                if(val !== 0) { cell.appendChild(document.createTextNode(val)); marks.style.display = 'none'; isFixed[i] = true; }
                cell.onclick = () => { selectedIndex = i; document.querySelectorAll('.cell').forEach((c, idx) => c.classList.toggle('selected', idx === i)); };
                gridEl.appendChild(cell);
            });
            document.getElementById('setup').style.display = 'none';
            gridEl.style.display = 'grid';
            document.getElementById('controls').style.display = 'block';
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const d = (Date.now() - startTime)/1000;
                document.getElementById('timer').innerText = `${Math.floor(d/60).toString().padStart(2,'0')}:${(d%60).toFixed(1).padStart(4,'0')}`;
            }, 100);
        }

        function handleInput(num) {
            if (selectedIndex === -1 || isFixed[selectedIndex] || !timerInterval) return;
            const target = document.querySelectorAll('.cell')[selectedIndex];
            const marksLayer = target.querySelector('.pencil-marks');
            if (pencilMode && num !== '') {
                const m = target.querySelector(`.m${num}`), v = parseInt(num);
                if (m.innerText === num) { m.innerText = ''; manualRemoved[selectedIndex].push(v); }
                else { m.innerText = num; manualRemoved[selectedIndex] = manualRemoved[selectedIndex].filter(x => x !== v); }
                marksLayer.style.display = 'grid';
                if(target.lastChild && target.lastChild.nodeType === 3) target.lastChild.textContent = '';
            } else {
                if (num === '') {
                    target.classList.remove('user', 'error');
                    marksLayer.style.display = 'grid';
                    if(target.lastChild && target.lastChild.nodeType === 3) target.lastChild.textContent = '';
                } else if (parseInt(num) !== solution[selectedIndex]) {
                    errors++; document.getElementById('error-count').innerText = errors;
                    target.classList.add('error'); setTimeout(() => target.classList.remove('error'), 500);
                } else {
                    target.classList.remove('error', 'user'); target.classList.add('user');
                    marksLayer.style.display = 'none';
                    const node = document.createTextNode(num);
                    if(target.lastChild && target.lastChild.nodeType === 3) target.lastChild.replaceWith(node); else target.appendChild(node);
                    if (autoPencilActive) autoFillPencil();
                    checkWin();
                }
            }
        }

        function autoFillPencil() {
            autoPencilActive = true;
            const cells = document.querySelectorAll('.cell');
            const board = Array.from(cells).map(c => {
                if (c.classList.contains('fixed')) return parseInt(c.innerText);
                if (c.classList.contains('user') && c.lastChild && c.lastChild.nodeType === 3) return parseInt(c.lastChild.textContent);
                return 0;
            });
            cells.forEach((cell, idx) => {
                if (!cell.classList.contains('fixed') && !cell.classList.contains('user')) {
                    cell.querySelector('.pencil-marks').style.display = 'grid';
                    for (let n = 1; n <= 9; n++) {
                        const m = cell.querySelector(`.m${n}`);
                        m.innerText = (isValid(board, idx, n) && !manualRemoved[idx].includes(n)) ? n : '';
                    }
                }
            });
        }

        function togglePencil() {
            pencilMode = !pencilMode;
            const btn = document.getElementById('pencil-toggle');
            btn.innerText = `PENCIL MODE: ${pencilMode ? 'ON' : 'OFF'}`;
            btn.classList.toggle('active', pencilMode);
        }

        function checkWin() {
            const cells = document.querySelectorAll('.cell');
            const isComplete = Array.from(cells).every(c => c.classList.contains('fixed') || c.classList.contains('user'));
            if (isComplete) {
                clearInterval(timerInterval); timerInterval = null;
                document.getElementById('timer').style.color = '#00ff00';
                setTimeout(() => alert("🎉 Completion Time: " + document.getElementById('timer').innerText), 100);
            }
        }
    </script>
</body>
</html>
