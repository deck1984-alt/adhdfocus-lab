<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADHDFocus Lab</title>
    <style>
        :root { 
            --accent: #4dadff;
            --bg: #121212;
            --secondary: #607d8b;
        }
        body { 
            background: var(--bg); 
            color: #e0e0e0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
        }
        .container { width: 90%; max-width: 500px; text-align: center; margin-top: 50px; }
        h1 { color: var(--accent); margin-bottom: 30px; letter-spacing: 1px; }
        textarea { 
            width: 100%; height: 150px; background: #222; color: #0f0; 
            border: 1px solid #444; padding: 15px; box-sizing: border-box; 
            font-family: monospace; border-radius: 8px; font-size: 16px;
            outline: none;
        }
        textarea:focus { border-color: var(--accent); }
        .btn { 
            width: 100%; padding: 15px; margin-top: 15px; border: none; 
            border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; 
            color: #fff; transition: 0.2s;
        }
        .start-btn { background: var(--accent); }
        .identify-btn { background: var(--secondary); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ADHDFocus Lab</h1>
        <textarea id="jsonInput" placeholder="貼上 81 位數字或 JSON 數列..."></textarea>
        
        <button class="btn start-btn" onclick="goToGame()">開始挑戰</button>
        
        <button class="btn identify-btn" onclick="window.location.href='sukodu-identify.html'">
            <span>📷</span> 辨識照片
        </button>
    </div>

    <script>
        // 頁面載入時檢查參數，但不跳轉
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const puzzle = urlParams.get('puzzle');
            if (puzzle) {
                // 只將數列填入框內，讓使用者確認
                document.getElementById('jsonInput').value = puzzle;
            }
        };

        function goToGame() {
            const input = document.getElementById('jsonInput').value.trim();
            if (input) {
                // 將目前框內的數列帶往遊戲頁面
                window.location.href = `sukodu.html?puzzle=${encodeURIComponent(input)}`;
            } else {
                alert("請先輸入數獨數列或使用辨識功能");
            }
        }
    </script>
</body>
</html>
