<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Playing - Cozy Sudoku</title>
    <style>
        :root { 
            --cell-size: calc(100vw / 10); 
            --border-thick: 4px; 
            --accent: #b15b2e; /* 溫暖的橘褐貓咪色 */
            --bg: #f9f1e6; /* 溫馨米白色背景 */
            --cell-bg: #fffbf5; /* 略帶奶油白的格子 */
            --fixed-bg: #eddcc4; /* 題目格：淡淡的木頭色 */
            --text-main: #4a3525; /* 深咖啡色線條與文字，比純黑溫柔 */
            --success: #6e8b3d; /* 抹茶綠 */
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: "Comic Sans MS", "Chalkboard SE", "YuGothic", sans-serif; /* 偏向圓潤的字體 */
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 10px; touch-action: manipulation; 
        }
        #status-bar { display: flex; justify-content: space-around; width: 100%; max-width: 400px; margin-bottom: 15px; font-family: monospace; font-size: 18px; font-weight: bold; }
        .stat-value { color: var(--accent); }
        
        /* 數獨棋盤：換成深咖啡色粗框 */
        #grid { 
            display: grid; 
            grid-template-columns: repeat(9, var(--cell-size)); 
            grid-template-rows: repeat(9, var(--cell-size)); 
            border: var(--border-thick) solid var(--text-main); 
            background: var(--text-main); 
            border-radius: 12px; /* 讓角落圓潤一點 */
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(74, 53, 37, 0.15);
        }
        .cell { 
            width: var(--cell-size); height: var(--cell-size); 
            background: var(--cell-bg); 
            border: 1px solid #dcd1c4; 
            display: flex; align-items: center; justify-content: center; 
            font-size: calc(var(--cell-size) * 0.55); 
            color: var(--text-main);
            font-weight: bold;
            cursor: pointer; position: relative; 
        }
        .cell:nth-child(3n) { border-right: var(--border-thick) solid var(--text-main); }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27), .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: var(--border-thick) solid var(--text-main); }
        
        /* 題目格樣式 */
        .cell.fixed { color: var(--text-main); background: var(--fixed-bg); }
        /* 使用者填入的字體顏色 */
        .cell.user { color: #008022; } 
        .cell.error { background: #fcdcd7; animation: shake 0.2s; }
        .cell.selected { background: #f3e5d0; outline: 3px solid var(--accent); z-index: 5; outline-offset: -3px; }
        
        /* 鉛筆標記 */
        .pencil-marks { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); 
            width: 100%; height: 100%; padding: 2px; pointer-events: none; position: absolute; top: 0; left: 0;
        }
        .pencil-mark { 
            display: flex; align-items: center; justify-content: center; 
            font-size: calc(var(--cell-size) * 0.22); line-height: 1; color: #a39284; 
        }
        
        #controls { width: 100%; max-width: 400px; margin-top: 20px; }
        #numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 10px; }
        
        /* 按鈕：全部換成圓角、溫暖咖啡色系 */
        .num-btn { 
            background: #eddcc4; color: var(--text-main); border: 2px solid var(--text-main); 
            padding: 12px 0; font-size: 22px; font-weight: bold; border-radius: 10px; text-align: center; 
            box-shadow: 0 3px 0 var(--text-main); transition: 0.1s;
        }
        .num-btn:active { transform: translateY(3px); box-shadow: none; background: #e3ceb2; }
        
        .mode-btn { 
            width: 100%; padding: 12px; border: 2px solid var(--text-main); color: var(--text-main); 
            border-radius: 10px; font-weight: bold; margin-top: 8px; font-size: 15px; cursor: pointer;
            box-shadow: 0 3px 0 var(--text-main); transition: 0.1s;
        }
        .mode-btn:active { transform: translateY(3px); box-shadow: none; }
        .btn-auto { background: #cce3a3; } /* 抹茶綠按鈕 */
        .back-btn { background: #e0d5ca; margin-top: 15px; }
        
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-3px);} 75% {transform: translateX(3px);} }
    </style>
</head>
<body>

    <div id="status-bar">
        <div>TIME <span id="timer" class="stat-value">00:00.0</span></div>
        <div>ERRORS <span id="error-count" class="stat-value">0</span></div>
    </div>
    
    <div id="grid"></div>

    <div id="controls">
        <button class="mode-btn btn-auto" onclick="autoFillPencil()">🐾 FAST PENCIL</button>
        <div id="numpad" style="margin-top: 10px;">
            <div class="num-btn" onclick="handleInput('1')">1</div>
            <div class="num-btn" onclick="handleInput('2')">2</div>
            <div class="num-btn" onclick="handleInput('3')">3</div>
            <div class="num-btn" onclick="handleInput('4')">4</div>
            <div class="num-btn" onclick="handleInput('5')">5</div>
            <div class="num-btn" onclick="handleInput('6')">6</div>
            <div class="num-btn" onclick="handleInput('7')">7</div>
            <div class="num-btn" onclick="handleInput('8')">8</div>
            <div class="num-btn" onclick="handleInput('9')">9</div>
            <div class="num-btn" onclick="handleInput('')">⌫</div>
        </div>
        <button id="pencil-toggle" class="mode-btn" style="background:#fff;" onclick="togglePencil()">✏️ PENCIL MODE: OFF</button>
        <button class="mode-btn back-btn" onclick="window.location.href='index.html'">🐾 回首頁</button>
    </div>

    <script>
        // --- 以下保留你原本所有的遊戲邏輯，完全沒變動 ---
        let selectedIndex = -1, errors = 0, startTime, timerInterval, solution = [], pencilMode = false, autoPencilActive = false;
        let manualRemoved = Array.from({ length: 81 }, () => []), isFixed = new Array(81).fill(false);

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const puzzle = urlParams.get('puzzle');
            if (puzzle) {
                try {
                    let board = [];
                    if (/^\d{81}$/.test(puzzle)) {
                        board = puzzle.split('').map(Number);
                    } else {
                        board = JSON.parse(puzzle).flat();
                    }
                    let boardCopy = [...board];
                    if (!solveSudoku(boardCopy)) throw "無解";
                    solution = boardCopy;
                    initGrid(board);
                } catch (e) {
                    alert("數列格式錯誤或無解");
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        };

        function solveSudoku(b) {
            const i = b.indexOf(0);
            if (i === -1) return true;
            for (let n = 1; n <= 9; n++) {
                if (isValid(b, i, n)) {
                    b[i] = n;
                    if (solveSudoku(b)) return true;
                    b[i] = 0;
                }
            }
            return false;
        }

        function isValid(b, idx, v) {
            const r = Math.floor(idx/9), c = idx%9;
            for (let i=0; i<9; i++) if (b[r*9+i]===v || b[i*9+c]===v) return false;
            const br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3;
            for (let i=0; i<3; i++) for (let j=0; j<3; j++) if (b[(br+i)*9+(bc+j)]===v) return false;
            return true;
        }

        function initGrid(initial) {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            initial.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = val === 0 ? 'cell' : 'cell fixed';
                const marks = document.createElement('div');
                marks.className = 'pencil-marks';
                for(let m=1; m<=9; m++) {
                    const mk = document.createElement('div');
                    mk.className = `pencil-mark m${m}`;
                    marks.appendChild(mk);
                }
                cell.appendChild(marks);
                if(val !== 0) { 
                    cell.appendChild(document.createTextNode(val)); 
                    marks.style.display = 'none'; 
                    isFixed[i] = true; 
                }
                cell.onclick = () => { 
                    selectedIndex = i; 
                    document.querySelectorAll('.cell').forEach((c, idx) => c.classList.toggle('selected', idx === i)); 
                };
                gridEl.appendChild(cell);
            });
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const d = (Date.now() - startTime)/1000;
                document.getElementById('timer').innerText = `${Math.floor(d/60).toString().padStart(2,'0')}:${(d%60).toFixed(1).padStart(4,'0')}`;
            }, 100);
        }

        function handleInput(num) {
            if (selectedIndex === -1 || isFixed[selectedIndex] || !timerInterval) return;
            const target = document.querySelectorAll('.cell')[selectedIndex];
            const marksLayer = target.querySelector('.pencil-marks');
            if (pencilMode && num !== '') {
                const m = target.querySelector(`.m${num}`), v = parseInt(num);
                if (m.innerText === num) { m.innerText = ''; manualRemoved[selectedIndex].push(v); }
                else { m.innerText = num; manualRemoved[selectedIndex] = manualRemoved[selectedIndex].filter(x => x !== v); }
                marksLayer.style.display = 'grid';
                if(target.lastChild && target.lastChild.nodeType === 3) target.lastChild.textContent = '';
            } else {
                if (num === '') {
                    target.classList.remove('user', 'error');
                    marksLayer.style.display = 'grid';
                    if(target.lastChild && target.lastChild.nodeType === 3) target.lastChild.textContent = '';
                } else if (parseInt(num) !== solution[selectedIndex]) {
                    errors++; document.getElementById('error-count').innerText = errors;
                    target.classList.add('error'); setTimeout(() => target.classList.remove('error'), 500);
                } else {
                    target.classList.remove('error', 'user'); target.classList.add('user');
                    marksLayer.style.display = 'none';
                    const node = document.createTextNode(num);
                    if(target.lastChild && target.lastChild.nodeType === 3) target.lastChild.replaceWith(node); else target.appendChild(node);
                    if (autoPencilActive) autoFillPencil();
                    checkWin();
                }
            }
        }

        function autoFillPencil() {
            autoPencilActive = true;
            const cells = document.querySelectorAll('.cell');
            const board = Array.from(cells).map(c => {
                if (c.classList.contains('fixed')) return parseInt(c.innerText);
                if (c.classList.contains('user') && c.lastChild && c.lastChild.nodeType === 3) return parseInt(c.lastChild.textContent);
                return 0;
            });
            cells.forEach((cell, idx) => {
                if (!cell.classList.contains('fixed') && !cell.classList.contains('user')) {
                    cell.querySelector('.pencil-marks').style.display = 'grid';
                    for (let n = 1; n <= 9; n++) {
                        const m = cell.querySelector(`.m${n}`);
                        m.innerText = (isValid(board, idx, n) && !manualRemoved[idx].includes(n)) ? n : '';
                    }
                }
            });
        }

        function togglePencil() {
            pencilMode = !pencilMode;
            const btn = document.getElementById('pencil-toggle');
            btn.innerText = `✏️ PENCIL MODE: ${pencilMode ? 'ON' : 'OFF'}`;
            btn.classList.toggle('active', pencilMode);
        }

        function checkWin() {
            const cells = document.querySelectorAll('.cell');
            const isComplete = Array.from(cells).every(c => c.classList.contains('fixed') || c.classList.contains('user'));
            if (isComplete) {
                clearInterval(timerInterval); timerInterval = null;
                document.getElementById('timer').style.color = '#6e8b3d';
                setTimeout(() => alert("🎉 Completion Time: " + document.getElementById('timer').innerText), 100);
            }
        }
    </script>
</body>
</html>
