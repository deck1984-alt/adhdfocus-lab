<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數獨辨識 v5.6 - ADHDFocusLAB 版</title>
    <style>
        :root { --bg-color: #121212; --accent-color: #4caf50; --error-color: #cf6679; --info-color: #2196f3; }
        body { font-family: sans-serif; background: var(--bg-color); color: #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { max-width: 400px; width: 100%; text-align: center; border: 1px solid #333; padding: 2rem; border-radius: 12px; background: #1e1e1e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 6px; border: 1px solid #444; box-sizing: border-box; }
        input[type="text"] { background: #2c2c2c; color: white; }
        button { background: var(--accent-color); color: white; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:disabled { opacity: 0.5; }
        #status { margin-top: 15px; font-size: 14px; color: #aaa; min-height: 1.5em; }
        .label-text { font-size: 12px; color: #666; margin-bottom: 5px; display: block; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>數獨掃描器</h2>
    
    <span class="label-text">輸入 Key 或特定識別碼：</span>
    <input type="text" id="apiKeyInput" placeholder="在此輸入 Key 或識別碼">
    
    <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
    
    <input type="file" id="imageInput" accept="image/*">
    <button id="scanBtn">開始辨識</button>
    
    <div id="status">準備就緒</div>
</div>

<script src="api-key.js"></script>
    // <script src="identify-prompt.js"></script>
     //  辨識邏輯設定
<script>
const IDENTIFY_CONFIG = {
    PROMPT: "GEOMETRIC ANCHORING AND COORDINATE MAPPING
Define nine equal column slots and nine equal row slots based on grid dimensions. Every cell must be locked to a specific coordinate from R1C1 to R9C9. The system processes the grid by slot address rather than visual flow to ensure spatial accuracy.
OPTICAL CHARACTER RECOGNITION PROTOCOL
Scan each slot address in top to bottom and left to right order. If a slot contains only background pixels or is empty return zero. Ignore specific hex color codes including blue and transparent white overlays. Every cell is mapped strictly to its row and column identity.
BLOCK INTEGRITY AND DATA VALIDATION
Organize data into nine three by three arrays to maintain block integrity. Perform a uniqueness check for digits one through nine within every row column and three by three block. If a duplicate is detected the system must re scan the conflicting coordinates and verify alignment with neighboring slots.
OUTPUT REQUIREMENTS
Provide a block dump showing each three by three section with explicit row and column coordinates for auditing. Generate a final stream consisting of an eighty one character continuous string of digits including zeros for empty cells.",

    MODEL: "gemini-3.1-flash-lite",

    GENERATION: {
        temperature: 0,
        topP: 1,
        maxOutputTokens: 100
    },
};

</script>
<script>
    const apiKeyInput = document.getElementById('apiKeyInput');
    
    // 初始化：嘗試從 localStorage 恢復上次輸入的內容
    apiKeyInput.value = localStorage.getItem('sudoku_input_val') || '';

    document.getElementById('scanBtn').onclick = async function() {
        const fileInput = document.getElementById('imageInput');
        const status = document.getElementById('status');
        const btn = this;

        const inputVal = apiKeyInput.value.trim();
        let finalApiKey = "";

        // --- 核心邏輯：判斷輸入內容 ---
        if (inputVal === API_CONFIG.DEBUG_MODE_TRIGGER) {
            // 如果輸入觸發碼，從 api-key.js 抓取
            finalApiKey = API_CONFIG.GEMINI_KEY;
            status.style.color = "var(--info-color)";
            status.innerText = "已啟用內部授權模式...";
        } else {
            // 否則，將輸入內容視為 API Key 本身
            finalApiKey = inputVal;
        }

        // 基本檢查
        if (!finalApiKey || finalApiKey.length < 10) {
            alert('請輸入有效的 API Key 或識別碼');
            return;
        }
        if (fileInput.files.length === 0) {
            alert('請選擇圖片');
            return;
        }

        // 儲存目前的輸入值
        localStorage.setItem('sudoku_input_val', inputVal);
        
        btn.disabled = true;
        
        try {
            const file = fileInput.files[0];
            
            // 圖片壓縮
            const base64Data = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const max_size = 1024; 
                        let width = img.width, height = img.height;
                        if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                        else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });

            status.innerText = "正在傳送至 AI 辨識中...";
            status.style.color = "var(--accent-color)";

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${IDENTIFY_CONFIG.MODEL}:generateContent?key=${finalApiKey}`;

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: IDENTIFY_CONFIG.PROMPT },
                            { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                        ]
                    }],
                    generationConfig: IDENTIFY_CONFIG.GENERATION
                })
            });

            const data = await response.json();
            
            if (response.status === 429) throw new Error("額度耗盡，請等候 15 秒再試。");
            if (data.error) throw new Error(data.error.message);

            const result = data.candidates[0].content.parts[0].text.replace(/[^0-9]/g, '').slice(0, 81);
            
            if (result.length < 81) throw new Error("辨識不足 81 碼，請重拍或保持圖片清晰。");

            status.innerText = "辨識成功！跳轉中...";
            window.location.href = `index.html?puzzle=${result}`;

        } catch (err) {
            status.innerText = "錯誤: " + err.message;
            status.style.color = "var(--error-color)";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
