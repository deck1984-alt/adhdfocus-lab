<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數獨辨識子系統 - v5.2 Stable</title>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0; --accent-color: #4caf50; --error-color: #cf6679; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { max-width: 400px; width: 100%; text-align: center; border: 1px solid #333; padding: 2rem; border-radius: 12px; background: var(--card-bg); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input[type="text"], input[type="file"] { width: 100%; margin: 10px 0; padding: 12px; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background-color: var(--accent-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; font-weight: bold; }
        button:disabled { opacity: 0.5; }
        #status { margin-top: 20px; font-size: 14px; word-break: break-all; }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>數獨掃描器 (v5.2)</h2>
    <input type="text" id="apiKey" placeholder="API Key">
    <hr>
    <input type="file" id="imageInput" accept="image/*">
    <button id="scanBtn">辨識並回傳</button>
    <div id="status">準備就緒</div>
</div>

<script>
    const keyInput = document.getElementById('apiKey');
    keyInput.value = localStorage.getItem('sudoku_gemini_key') || '';

    document.getElementById('scanBtn').onclick = async function() {
        const fileInput = document.getElementById('imageInput');
        const apiKey = keyInput.value.trim();
        const status = document.getElementById('status');
        const btn = this;

        if (!apiKey || fileInput.files.length === 0) { alert('請檢查 Key 或圖片'); return; }

        localStorage.setItem('sudoku_gemini_key', apiKey);
        btn.disabled = true;
        status.innerText = "連線中...";

        try {
            const file = fileInput.files[0];
            const base64Data = await new Promise((res) => {
                const reader = new FileReader();
                reader.onload = () => res(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            // 使用 3.1 Flash Lite 或 2.0 Flash
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "OCR this Sudoku puzzle. Output exactly 81 digits as a single string. Use '0' for empty cells. Do not add any explanation or extra characters. Ensure the grid order is left-to-right, top-to-bottom." },
                            { inline_data: { mime_type: file.type, data: base64Data } }
                        ]
                    }],
                    generationConfig: {
                        temperature: 0, // 強制最穩定輸出
                        topP: 1,
                        maxOutputTokens: 100
                    }
                })
            });

            const resData = await response.json();
            if (resData.error) throw new Error(resData.error.message);

            const rawText = resData.candidates[0].content.parts[0].text;
            // 過濾掉所有非數字字元 (防止 AI 給出換行或空白)
            const finalSequence = rawText.replace(/[^0-9]/g, '').slice(0, 81);

            if (finalSequence.length < 81) {
                throw new Error("辨識碼長度不足 81 碼，請換個角度重拍。");
            }

            status.innerText = "辨識完成，確認合法性中...";
            // 跳轉至你的主程式頁面
            window.location.href = `index.html?puzzle=${finalSequence}`;

        } catch (err) {
            status.innerText = "錯誤: " + err.message;
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
