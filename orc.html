<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數獨辨識 v5.3 - 節能省錢版</title>
    <style>
        :root { --bg-color: #121212; --accent-color: #4caf50; --error-color: #cf6679; }
        body { font-family: sans-serif; background: var(--bg-color); color: #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { max-width: 400px; width: 100%; text-align: center; border: 1px solid #333; padding: 2rem; border-radius: 12px; background: #1e1e1e; }
        input, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 6px; border: 1px solid #444; box-sizing: border-box; }
        button { background: var(--accent-color); color: white; border: none; cursor: pointer; font-weight: bold; }
        #status { margin-top: 15px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>
<div class="container">
    <h3>數獨掃描 (省流量版)</h3>
    <input type="text" id="apiKey" placeholder="API Key">
    <input type="file" id="imageInput" accept="image/*">
    <button id="scanBtn">開始辨識</button>
    <div id="status">準備就緒</div>
</div>

<script>
    const keyInput = document.getElementById('apiKey');
    keyInput.value = localStorage.getItem('sudoku_gemini_key') || '';

    document.getElementById('scanBtn').onclick = async function() {
        const fileInput = document.getElementById('imageInput');
        const apiKey = keyInput.value.trim();
        const status = document.getElementById('status');
        if (!apiKey || fileInput.files.length === 0) return alert('缺少 Key 或圖片');

        localStorage.setItem('sudoku_gemini_key', apiKey);
        this.disabled = true;
        status.innerText = "圖片壓縮中...";

        try {
            const file = fileInput.files[0];
            
            // --- 圖片壓縮邏輯 ---
            const base64Data = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const max_size = 800; // 縮小到 800px 辨識最省錢
                        let width = img.width, height = img.height;
                        if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                        else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]); // 壓縮品質 0.7
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });

            status.innerText = "連線至 Gemini 3.1 Lite...";
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${apiKey}`;

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [
                        { text: "Output 81 digits for this Sudoku. Use 0 for blanks. String only." },
                        { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                    ]}]
                })
            });

            const data = await response.json();
            if (response.status === 429) throw new Error("額度滿了，請等 15 秒再試一次。");
            if (data.error) throw new Error(data.error.message);

            const result = data.candidates[0].content.parts[0].text.replace(/[^0-9]/g, '').slice(0, 81);
            status.innerText = "成功！跳轉中...";
            window.location.href = `index.html?puzzle=${result}`;

        } catch (err) {
            status.innerText = "錯誤: " + err.message;
            this.disabled = false;
        }
    };
</script>
</body>
</html>
